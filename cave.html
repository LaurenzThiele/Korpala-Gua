<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Korpala | Gua</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="images/korpala_logo.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/cave-style.css">
</head>
<body>

<header>
   <a href="index.html" id="backButton">Kembali</a>
    <div class="logo-container">
      <img src="images/korpala_logo.png" alt="Korpala Logo" class="logo">
    </div>
  <h1 id="caveName">Gua Indonesia</h1>
  <p id="caveDesc"></p>
</header>

<div id="content-wrapper">
  <div id="info">
    <div class="info-row">
      <strong>Daerah</strong> <span id="caveRegion"></span><br>
      <strong>Jenis</strong> <span id="caveType"></span><br>
      <strong>Kedalaman</strong> <span id="caveDepth"></span>
    </div>

    <div class="info-row">
      <strong>UTM</strong> <span id="caveUTM"></span><br>
      <strong>Lat/Lon</strong> <span id="caveLatLon"></span>
    </div>
  </div>

  <div id="map"></div>
</div>

<h2 id="labelCaveImagePreview" class="hidden">Peta Gua</h2>
<div id="caveImagePreview" class="caveImagePreview hidden"></div>

<footer>
  <img src="images/korpala_logo_speleogi.png" alt="Korpala Logo Wide" class="logo-wide">
  <p>&copy; 2025 Korpala Universitas Hasanuddin. All rights reserved.</p>
</footer>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.8.0/proj4.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"></script>
<script src="js/config.js"></script>
<script src="js/cave-script.js"></script>
</body>
</html>
