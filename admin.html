<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="images/korpala_logo.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin-style.css">
</head>
<body>

<div id="adminLoginOverlay">
  <form id="adminLoginForm">

    <div class="form-header">
      <h3>Admin Login</h3>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="adminLoginEmail" placeholder="Email" autofocus required autocomplete="username" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="adminLoginPassword" placeholder="Password" required autocomplete="current-password" />
    </div>

    <button type="submit">Login</button>
    <div id="adminLoginError"></div>
  </form>
</div>

  <header>
   <a href="index.html" id="backButton">Kembali</a>
    <div class="logo-container">
      <img src="images/korpala_logo.png" alt="Korpala Logo" class="logo">
    </div>
  <h1 id="caveName">Kelola Data</h1>
  <p id="caveDesc"></p>
</header>

<!-- TOP ACTION BUTTONS -->
<div id="modeButtons">
  <button id="btnModeAdd" class="active">Tambah Gua Baru</button>

  <div class="separator">
    <span>atau</span>
  </div>

  <div class="select-wrapper">
    <select id="editSelect">
      <option value="">Edit Gua</option>
    </select>

     <svg class="select-arrow" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <!-- DOWN arrow -->
      <path class="arrow-down" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M19 9l-7 7-7-7" />
      <!-- UP arrow -->
      <path class="arrow-up" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M5 15l7-7 7 7"/>
    </svg>
  </div>
</div>

<!-- FORM CONTAINER -->
<div id="formContainer">
  <div id="addFormContainer" class="hidden">
    <form id="addCaveForm">
       <div class="form-header">
            <h3>Tambah Gua</h3>
       </div>

      <div class="form-group">
        <label>Nama</label>
        <input type="text" id="add_name" required>
        <label>Daerah</label>
        <input type="text" id="add_region" required>
      </div>

      <div class="form-group">
        <label>Jenis</label>
        <input type="text" id="add_type" required>

        <label>Kedalaman (m)</label>
        <input type="number" id="add_depth_m" required>
      </div>

      <div class="form-group">
        <label>Deskripsi (opsional)</label>
        <textarea id="add_description"></textarea>
      </div>
        
      <div class="form-group">
        <label>UTM X</label>
        <input type="number" id="add_x" required>

        <label>UTM Y</label>
        <input type="number" id="add_y" required>

        <div id="add_map" class="map"></div>
      </div>

      <div class="form-group">
        <label>Peta Gua (opsional)<br>*Didukung: .png, .jpeg, .jpg, .pdf, .html</label>
        <input type="file" id="add_caveImageFile" accept=".png,.jpeg,.jpg,.pdf,.html,image/png,image/jpeg,image/jpg,application/pdf,text/html">
        <div id="add_caveImagePreview" class="caveImagePreview hidden"></div>
      </div>

      <button type="submit">Tambah Gua</button>
    </form>
  </div>

  <div id="editFormContainer" class="hidden">

    <form id="editCaveForm">

        <div class="form-header">
          <h3>Edit Gua</h3>
            <button id="btnDelete">
                <svg style="height: 24px; width: 24px"  fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
            </button>
        </div>
      
       <input type="hidden" id="edit_id">

      <div class="form-group">
        <label>Nama</label>
        <input type="text" id="edit_name" required>

        <label>Daerah</label>
        <input type="text" id="edit_region" required>
      </div>

      <div class="form-group">
        <label>Jenis</label>
        <input type="text" id="edit_type" required>

        <label>Kedalaman (m)</label>
        <input type="number" id="edit_depth_m" required>
      </div>

      <div class="form-group">
        <label>Deskripsi (optional)</label>
        <textarea id="edit_description"></textarea>
      </div>

      <div class="form-group">
        <label>UTM X</label>
        <input type="number" id="edit_x" required>

        <label>UTM Y</label>
        <input type="number" id="edit_y" required>

        <div id="edit_map" class="map"></div>
      </div>

      <div class="form-group">
        <label>Peta Gua (opsional)<br>*Didukung: .png, .jpeg, .jpg, .pdf, .html</label>
        <input type="file" id="edit_caveImageFile" accept=".png,.jpeg,.jpg,.pdf,.html,image/png,image/jpeg,image/jpg,application/pdf,text/html">
        <div id="edit_caveImagePreview" class="caveImagePreview hidden"></div>
      </div>

      <button type="submit">Update Gua</button>
    </form>
  </div>
</div>


<!-- Toast -->
<div id="toast-container"></div>

<footer>
  <img src="images/korpala_logo_speleogi.png" alt="Korpala Logo Wide" class="logo-wide">
  <p>&copy; 2025 Korpala Universitas Hasanuddin. All rights reserved.</p>
</footer>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.8.0/proj4.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"></script>
<script src="js/config.js"></script>
<script src="js/admin-script.js"></script>
</body>
</html>
